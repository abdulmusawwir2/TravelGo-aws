<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelGo - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B35;
            --secondary: #004E89;
            --accent: #F7B801;
            --dark: #1A1A2E;
            --light: #FFF8F0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated gradient background */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            background: linear-gradient(45deg, #1A1A2E, #16213e, #1A1A2E);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 30% 40%, rgba(247, 184, 1, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 70% 70%, rgba(255, 107, 53, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(0, 78, 137, 0.1) 0%, transparent 50%);
            animation: rotate 25s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(247, 184, 1, 0.6);
            border-radius: 50%;
            animation: rise 10s infinite ease-in;
        }

        @keyframes rise {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 20px;
            animation: fadeInScale 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .register-box {
            background: rgba(255, 248, 240, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .register-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 107, 53, 0.1), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            to { left: 100%; }
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3em;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .logo p {
            color: var(--secondary);
            font-size: 0.95em;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--dark);
            font-size: 2em;
            margin-bottom: 30px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
            animation: slideInLeft 0.5s ease-out backwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .input-wrapper {
            position: relative;
        }

        .input-label {
            position: absolute;
            left: 55px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(26, 26, 46, 0.4);
            font-size: 1em;
            transition: all 0.3s ease;
            pointer-events: none;
            font-weight: 500;
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--secondary);
            opacity: 0.5;
            font-size: 1.2em;
            transition: all 0.3s ease;
        }

        input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            border: 2px solid rgba(0, 78, 137, 0.1);
            border-radius: 15px;
            font-size: 1em;
            font-family: 'DM Sans', sans-serif;
            background: white;
            transition: all 0.3s ease;
            color: var(--dark);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 5px 20px rgba(255, 107, 53, 0.15);
            transform: translateY(-2px);
        }

        input:focus ~ .input-icon {
            color: var(--primary);
            opacity: 1;
            transform: translateY(-50%) scale(1.1);
        }

        input:focus ~ .input-label,
        input:not(:placeholder-shown) ~ .input-label {
            top: -10px;
            left: 15px;
            font-size: 0.75em;
            color: var(--primary);
            background: white;
            padding: 0 8px;
        }

        input::placeholder {
            color: transparent;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: rgba(0, 78, 137, 0.1);
            border-radius: 2px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .password-strength.active {
            opacity: 1;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .password-strength-bar.weak {
            width: 33%;
            background: #ff4757;
        }

        .password-strength-bar.medium {
            width: 66%;
            background: var(--accent);
        }

        .password-strength-bar.strong {
            width: 100%;
            background: #2ed573;
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), #ff8c5f);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
            animation: slideInLeft 0.5s ease-out 0.4s backwards;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
        }

        button:active {
            transform: translateY(-1px);
        }

        .divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
            z-index: 1;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(0, 78, 137, 0.2), transparent);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .divider span {
            background: var(--light);
            padding: 0 15px;
            color: var(--secondary);
            font-size: 0.9em;
            font-weight: 500;
            opacity: 0.7;
        }

        .link {
            text-align: center;
            margin-top: 25px;
            position: relative;
            z-index: 1;
            animation: slideInLeft 0.5s ease-out 0.5s backwards;
        }

        .link a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
            position: relative;
            transition: color 0.3s ease;
        }

        .link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .link a:hover {
            color: var(--primary);
        }

        .link a:hover::after {
            width: 100%;
        }

        .loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin: -10px 0 0 -10px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            z-index: 10;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .register-box {
                padding: 40px 30px;
            }

            .logo h1 {
                font-size: 2.5em;
            }

            h2 {
                font-size: 1.6em;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="register-box">
            <div class="logo">
                <h1>TravelGo</h1>
                <p>Start Your Adventure</p>
            </div>

            <h2>Create Account</h2>

            <form method="POST" id="registerForm">
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="text" name="name" placeholder="name" required>
                        <span class="input-label">Full Name</span>
                        <span class="input-icon">👤</span>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" name="email" placeholder="email" required>
                        <span class="input-label">Email Address</span>
                        <span class="input-icon">✉</span>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="password" name="password" id="password" placeholder="password" required>
                        <span class="input-label">Password</span>
                        <span class="input-icon">🔒</span>
                    </div>
                    <div class="password-strength">
                        <div class="password-strength-bar"></div>
                    </div>
                </div>

                <button type="submit" id="registerBtn">Create Account</button>
            </form>

            <div class="divider">
                <span>or</span>
            </div>

            <div class="link">
                <a href="/login">← Already have an account? Login</a>
            </div>
        </div>
    </div>

    <script>
        // Create floating particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.animationDuration = (Math.random() * 5 + 8) + 's';
            particlesContainer.appendChild(particle);
        }

        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthIndicator = document.querySelector('.password-strength');
        const strengthBar = document.querySelector('.password-strength-bar');

        passwordInput.addEventListener('input', function() {
            const password = this.value;
            strengthIndicator.classList.add('active');
            
            if (password.length === 0) {
                strengthIndicator.classList.remove('active');
                strengthBar.className = 'password-strength-bar';
                return;
            }
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z\d]/.test(password)) strength++;
            
            strengthBar.className = 'password-strength-bar';
            if (strength <= 2) {
                strengthBar.classList.add('weak');
            } else if (strength === 3) {
                strengthBar.classList.add('medium');
            } else {
                strengthBar.classList.add('strong');
            }
        });

        // Form submission
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const btn = document.getElementById('registerBtn');
            btn.classList.add('loading');
            btn.textContent = 'Creating Account...';
        });

        // Input animations
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', function() {
                if (!this.value) {
                    this.parentElement.classList.remove('focused');
                }
            });
        });
    </script>
</body>
</html>
